# /etc/nginx/sites-available/whisper.fantastair.cn
# 服务器 Nginx 配置：托管前端静态文件 + 反向代理 API 到 frp 隧道

server {
    listen 80;
    server_name whisper.fantastair.cn;

    # 前端静态文件（Vue SPA 构建产物）
    root /var/www/whisper.fantastair.cn/public;
    index index.html;

    # SPA 路由：所有非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理 → frp 隧道 → Windows 端 FastAPI :8000
    location /api/ {
        proxy_pass http://127.0.0.1:7443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 大文件上传支持（取消大小限制）
        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_http_version 1.1;
    }
}
